name: Verify npm token

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to do"
        required: true
        default: "verify-both"
        type: choice
        options:
          - verify-NPM_TOKEN
          - verify-NHO_NPM_TOKEN
          - verify-both
          - add-nhonh-as-owner
          - list-owners
          - lookup-nhonh-user

jobs:
  run:
    name: npm token / ownership ops
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: List package owners (read-only, no auth needed)
        if: inputs.mode == 'list-owners' || inputs.mode == 'verify-both'
        run: |
          echo "=== Current owners of lograft ==="
          npm owner ls lograft

      - name: Verify NPM_TOKEN (whoami + ping)
        if: inputs.mode == 'verify-NPM_TOKEN' || inputs.mode == 'verify-both'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== Secret: NPM_TOKEN ==="
          echo "set? $([ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo no)"
          echo "prefix: $(echo "$NODE_AUTH_TOKEN" | cut -c1-8)"
          echo ""
          echo "=== whoami ==="
          npm whoami
          echo ""
          echo "=== ping ==="
          npm ping

      - name: Verify NHO_NPM_TOKEN (whoami + ping)
        if: inputs.mode == 'verify-NHO_NPM_TOKEN' || inputs.mode == 'verify-both'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NHO_NPM_TOKEN }}
        run: |
          echo "=== Secret: NHO_NPM_TOKEN ==="
          echo "set? $([ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo no)"
          echo "length: ${#NODE_AUTH_TOKEN}"
          echo "first 8: $(echo "$NODE_AUTH_TOKEN" | cut -c1-8)"
          echo "last 4:  $(echo "$NODE_AUTH_TOKEN" | rev | cut -c1-4 | rev)"
          echo ""
          echo "=== whoami ==="
          npm whoami
          echo ""
          echo "=== ping ==="
          npm ping

      - name: Lookup nhonh user (authenticated via NPM_TOKEN)
        if: inputs.mode == 'lookup-nhonh-user'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== Direct registry lookup (authed) ==="
          curl -fsS -H "Authorization: Bearer $NODE_AUTH_TOKEN" \
            "https://registry.npmjs.org/-/user/org.couchdb.user:nhonh" \
            | jq '{_id, name, email, date}' || echo "(lookup failed)"
          echo ""
          echo "=== Profile via /-/profile path ==="
          curl -fsS -H "Authorization: Bearer $NODE_AUTH_TOKEN" \
            "https://registry.npmjs.org/-/profile" \
            | jq '{name, email, fullname}' || echo "(profile failed)"
          echo ""
          echo "=== Search packages by maintainer:nhonh ==="
          curl -fsS "https://registry.npmjs.org/-/v1/search?text=maintainer:nhonh&size=3" \
            | jq '.objects[].package | {name, maintainers: [.maintainers[].username]}'

      - name: Add nhonh as co-owner (authenticated as nano-step001 via NPM_TOKEN)
        if: inputs.mode == 'add-nhonh-as-owner'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== Owners BEFORE ==="
          npm owner ls lograft
          echo ""
          echo "=== Adding nhonh ==="
          npm owner add nhonh lograft
          echo ""
          echo "=== Owners AFTER ==="
          npm owner ls lograft
