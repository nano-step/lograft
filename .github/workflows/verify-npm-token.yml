name: Verify npm token

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to do"
        required: true
        default: "verify-both"
        type: choice
        options:
          - verify-NPM_TOKEN
          - verify-NHO_NPM_TOKEN
          - verify-both
          - add-nhonh-as-owner
          - list-owners
          - lookup-nhonh-user

jobs:
  run:
    name: npm token / ownership ops
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: List package owners (read-only, no auth needed)
        if: inputs.mode == 'list-owners' || inputs.mode == 'verify-both'
        run: |
          echo "=== Current owners of lograft ==="
          npm owner ls lograft

      - name: Verify NPM_TOKEN (whoami + ping)
        if: inputs.mode == 'verify-NPM_TOKEN' || inputs.mode == 'verify-both'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== Secret: NPM_TOKEN ==="
          echo "set? $([ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo no)"
          echo "prefix: $(echo "$NODE_AUTH_TOKEN" | cut -c1-8)"
          echo ""
          echo "=== whoami ==="
          npm whoami
          echo ""
          echo "=== ping ==="
          npm ping

      - name: Verify NHO_NPM_TOKEN (whoami + ping)
        if: inputs.mode == 'verify-NHO_NPM_TOKEN' || inputs.mode == 'verify-both'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NHO_NPM_TOKEN }}
        run: |
          echo "=== Secret: NHO_NPM_TOKEN ==="
          echo "set? $([ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo no)"
          echo "length: ${#NODE_AUTH_TOKEN}"
          echo "first 8: $(echo "$NODE_AUTH_TOKEN" | cut -c1-8)"
          echo "last 4:  $(echo "$NODE_AUTH_TOKEN" | rev | cut -c1-4 | rev)"
          echo ""
          echo "=== whoami ==="
          npm whoami
          echo ""
          echo "=== ping ==="
          npm ping

      - name: Lookup nhonh user (authenticated via NPM_TOKEN)
        if: inputs.mode == 'lookup-nhonh-user'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== Direct registry lookup (authed) ==="
          curl -fsS -H "Authorization: Bearer $NODE_AUTH_TOKEN" \
            "https://registry.npmjs.org/-/user/org.couchdb.user:nhonh" \
            | jq '{_id, name, email, date}' || echo "(lookup failed)"
          echo ""
          echo "=== Profile via /-/profile path ==="
          curl -fsS -H "Authorization: Bearer $NODE_AUTH_TOKEN" \
            "https://registry.npmjs.org/-/profile" \
            | jq '{name, email, fullname}' || echo "(profile failed)"
          echo ""
          echo "=== Search packages by maintainer:nhonh ==="
          curl -fsS "https://registry.npmjs.org/-/v1/search?text=maintainer:nhonh&size=3" \
            | jq '.objects[].package | {name, maintainers: [.maintainers[].username]}'

      - name: Add nhonh as co-owner (authenticated as nano-step001 via NPM_TOKEN)
        if: inputs.mode == 'add-nhonh-as-owner'
        env:
          NPM_AUTH: ${{ secrets.NPM_TOKEN }}
          NHO_AUTH: ${{ secrets.NHO_NPM_TOKEN }}
        run: |
          set -e
          echo "=== Owners BEFORE ==="
          curl -fsS "https://registry.npmjs.org/lograft" \
            | jq -r '.maintainers[] | "\(.name) <\(.email)>"'
          echo ""

          echo "=== Attempt 1: npm owner add via NPM_TOKEN (likely fails on user-lookup) ==="
          if NODE_AUTH_TOKEN="$NPM_AUTH" npm owner add nhonh lograft 2>&1; then
            echo "(attempt 1 succeeded)"
          else
            echo "(attempt 1 failed as expected — falling back)"
          fi
          echo ""

          echo "=== Attempt 2: Hand-rolled PUT to /-/package/lograft/collaborators/nhonh ==="
          echo "(npm's new HTTP API — bypasses CouchDB user-lookup)"
          curl -fsS -X PUT \
            -H "Authorization: Bearer $NPM_AUTH" \
            -H "Content-Type: application/json" \
            -d '{"permissions":"read-write"}' \
            "https://registry.npmjs.org/-/package/lograft/collaborators/nhonh" \
            && echo "(attempt 2 succeeded)" \
            || echo "(attempt 2 failed)"
          echo ""

          echo "=== Attempt 3: Look up nhonh's real email using NHO_NPM_TOKEN (self-read) ==="
          NHONH_PROFILE=$(curl -fsS -H "Authorization: Bearer $NHO_AUTH" \
            "https://registry.npmjs.org/-/npm/v1/user" 2>&1)
          echo "profile lookup: $(echo "$NHONH_PROFILE" | head -c 200)"
          NHONH_EMAIL=$(echo "$NHONH_PROFILE" | jq -r '.email // empty')
          NHONH_NAME=$(echo "$NHONH_PROFILE" | jq -r '.name // .username // empty')
          echo "resolved: name='$NHONH_NAME' email='$NHONH_EMAIL'"
          if [ -z "$NHONH_EMAIL" ]; then
            echo "(could not resolve nhonh's email, falling back to nhoxtvt@gmail.com)"
            NHONH_EMAIL="nhoxtvt@gmail.com"
            NHONH_NAME="nhonh"
          fi
          echo ""

          echo "=== Attempt 4: PUT maintainers with REAL email from nhonh's profile ==="
          DOC=$(curl -fsS -H "Authorization: Bearer $NPM_AUTH" \
            "https://registry.npmjs.org/lograft?write=true")
          REV=$(echo "$DOC" | jq -r '."_rev"')
          echo "current _rev: $REV"
          UPDATED=$(echo "$DOC" | jq --arg n "$NHONH_NAME" --arg e "$NHONH_EMAIL" \
            '.maintainers += [{"name":$n,"email":$e}]')
          RESP=$(echo "$UPDATED" | curl -sS -X PUT \
            -H "Authorization: Bearer $NPM_AUTH" \
            -H "Content-Type: application/json" \
            --data @- \
            "https://registry.npmjs.org/lograft/-rev/$REV" \
            -w "\nHTTP_STATUS:%{http_code}\n" 2>&1)
          echo "response: $RESP"
          echo ""

          echo "=== Owners AFTER (with cache-buster) ==="
          sleep 3
          curl -fsS "https://registry.npmjs.org/lograft?ts=$(date +%s)" \
            | jq -r '.maintainers[] | "\(.name) <\(.email)>"'
