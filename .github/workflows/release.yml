name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Dist-tag for npm publish (beta | latest)"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: read
  id-token: write   # required for npm provenance (SLSA L3)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: |
          pnpm pack
          ls -lh lograft-*.tgz
          tar -tzf lograft-*.tgz | head -50
          rm lograft-*.tgz

      - name: Resolve dist-tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # tag-triggered: betas go to @beta, plain semver tags go to @latest
            REF="${GITHUB_REF#refs/tags/}"
            case "$REF" in
              *beta*|*alpha*|*rc*) echo "tag=beta" >> "$GITHUB_OUTPUT" ;;
              *)                    echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Diagnose NHO_NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NHO_NPM_TOKEN }}
        run: |
          echo "=== whoami ==="
          npm whoami 2>&1 || echo "(whoami failed)"
          echo ""
          echo "=== ping ==="
          npm ping 2>&1 || echo "(ping failed)"
          echo ""
          echo "=== token first 8 chars (to confirm it's set; safe to print npm_ prefix) ==="
          echo "$NODE_AUTH_TOKEN" | cut -c1-8

      - name: Publish to npm
        run: pnpm publish --tag "${{ steps.tag.outputs.tag }}" --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NHO_NPM_TOKEN }}
