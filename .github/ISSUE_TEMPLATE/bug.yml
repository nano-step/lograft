name: Bug report
description: Something in lograft is broken or behaves unexpectedly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please redact any PII from
        logs / fixtures before pasting. lograft is built around redaction; we
        practice what we ship.

  - type: input
    id: version
    attributes:
      label: lograft version
      description: Output of `npx lograft --version` or the `@beta` tag you installed.
      placeholder: "0.1.0-beta.0"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - opencode
        - Cursor
        - Claude Desktop
        - VS Code GitHub Copilot
        - Windsurf
        - Zed
        - Continue.dev
        - Other (please describe)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal MCP-client config + tool call sequence that triggers the bug.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (PII-redacted)
      description: stderr output from lograft. Redact any PII before pasting.
      render: shell
